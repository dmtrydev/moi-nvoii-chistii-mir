<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1f0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1510;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#151515;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e1e;stop-opacity:1" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="n" />
      <feColorMatrix in="n" type="saturate" values="0" result="m" />
      <feBlend in="SourceGraphic" in2="m" mode="multiply" />
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)" />
  <rect y="400" width="1920" height="680" fill="url(#ground)" />
  <rect width="1920" height="1080" fill="#1e1e1e" opacity="0.4" />
</svg>
