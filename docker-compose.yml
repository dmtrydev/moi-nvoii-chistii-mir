services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: moinoviichistiimir
      POSTGRES_USER: moinoviichistiimir
      POSTGRES_PASSWORD: moinoviichistiimir_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moinoviichistiimir -d moinoviichistiimir']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://moinoviichistiimir:moinoviichistiimir_secret@db:5432/moinoviichistiimir
    env_file:
      - ./server/.env

volumes:
  pgdata:

