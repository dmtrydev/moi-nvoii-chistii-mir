services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: moinoviichistiimir
      POSTGRES_USER: moinoviichistiimir
      POSTGRES_PASSWORD: moinoviichistiimir_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://moinoviichistiimir:moinoviichistiimir_secret@db:5432/moinoviichistiimir
    env_file:
      - ./server/.env

volumes:
  pgdata:

